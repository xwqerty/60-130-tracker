<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>60-130 Tracker</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background:#0d0d0f; color:#f2f2f2; font-family:-apple-system,"SF Pro Display",Helvetica,sans-serif;
         margin:0 auto; padding:1.4rem 1.2rem 2rem; max-width:26rem; min-height:100vh;
         display:flex; flex-direction:column; align-items:center; }
  h1 { font-size:.85rem; font-weight:600; letter-spacing:.35em; color:#5a5a60; margin:.4rem 0 1.2rem; }
  #pill { display:flex; align-items:center; gap:.55rem; font-size:.95rem; font-weight:500;
          padding:.45rem 1.1rem; border-radius:999px; background:#1c1c20; color:#c9a04c;
          transition:background .4s, color .4s; }
  #dot { width:.6rem; height:.6rem; border-radius:50%; background:#e6a817; transition:background .4s; }
  .searching #dot { animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity:.25; } }
  .ready #pill { background:#12291c; color:#7ee2a8; } .ready #dot { background:#2ecc71; }
  .armed #pill, .recording #pill { background:#301513; color:#f0907f; }
  .armed #dot, .recording #dot { background:#e74c3c; }
  .recording #dot { animation:pulse .7s ease-in-out infinite; }
  #detail { color:#54545a; font-size:.75rem; height:1rem; margin:.5rem 0 1rem; letter-spacing:.08em; }
  #mph { font-size:6.5rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1;
         letter-spacing:-.02em; }
  #mphlabel { color:#54545a; font-size:.85rem; letter-spacing:.35em; margin:.3rem 0 1.2rem; }
  #runzone { width:100%; height:6rem; display:flex; flex-direction:column; align-items:center; }
  #elapsed { font-size:2.3rem; font-weight:700; color:#e74c3c; font-variant-numeric:tabular-nums;
             height:2.9rem; }
  #track { width:100%; height:.45rem; border-radius:999px; background:#1c1c20; overflow:hidden;
           opacity:0; transition:opacity .3s; }
  .armed #track, .recording #track { opacity:1; }
  #fill { height:100%; width:0%; border-radius:999px; background:#e74c3c; transition:width .18s linear; }
  #ticks { width:100%; display:flex; justify-content:space-between; color:#54545a; font-size:.75rem;
           margin-top:.35rem; opacity:0; transition:opacity .3s; font-variant-numeric:tabular-nums; }
  .armed #ticks, .recording #ticks { opacity:1; }
  #seg { display:flex; width:100%; background:#1c1c20; border-radius:.9rem; padding:.3rem; gap:.3rem;
         margin-bottom:1rem; transition:opacity .3s; }
  #seg button { flex:1; font-size:.95rem; font-weight:600; padding:.75rem 0; border:none;
                border-radius:.65rem; background:transparent; color:#8a8a90; cursor:pointer;
                transition:background .2s, color .2s; font-variant-numeric:tabular-nums; }
  #seg button.sel { background:#33333a; color:#fff; }
  .armed #seg, .recording #seg { opacity:0; pointer-events:none; }
  #go { width:100%; font-size:1.35rem; font-weight:800; letter-spacing:.08em; padding:1.25rem 0;
        border:none; border-radius:1.1rem; background:#2ecc71; color:#07331b; cursor:pointer;
        transition:background .25s, color .25s, transform .06s; }
  #go:active { transform:scale(.975); }
  #go:disabled { background:#1c1c20; color:#54545a; cursor:default; }
  #go.cancel { background:#e74c3c; color:#3a0d07; }
  #runs { width:100%; margin-top:1.6rem; }
  .run { background:#17171b; border:1px solid #232329; border-radius:1rem; padding:.9rem 1.1rem;
         margin-bottom:.7rem; animation:drop .35s ease; }
  @keyframes drop { from { opacity:0; transform:translateY(-.5rem); } }
  .run .head { display:flex; align-items:baseline; gap:.6rem; }
  .run .big { font-size:1.45rem; font-weight:700; font-variant-numeric:tabular-nums; }
  .run .best { font-size:.65rem; font-weight:700; letter-spacing:.12em; color:#7ee2a8;
               background:#12291c; padding:.25rem .6rem; border-radius:999px; }
  .run .sub { color:#7a7a82; font-size:.82rem; margin-top:.3rem; font-variant-numeric:tabular-nums; }
  .partial .big { color:#e6a817; font-size:1.1rem; }
</style></head><body class="searching">
<h1>60&ndash;130 TRACKER</h1>
<div id="pill"><span id="dot"></span><span id="statustext">Starting&hellip;</span></div>
<div id="detail">&nbsp;</div>
<div id="mph">0.0</div>
<div id="mphlabel">MPH</div>
<div id="runzone">
  <div id="elapsed"></div>
  <div id="track"><div id="fill"></div></div>
  <div id="ticks"><span id="tick0">60</span><span id="tick1">130</span></div>
</div>
<div id="seg">
  <button data-r="60-130" class="sel">60&ndash;130</button>
  <button data-r="0-40">0&ndash;40 test</button>
  <button data-r="30-100">30&ndash;100</button>
</div>
<button id="go" disabled>START LOG</button>
<div id="runs"></div>
<script>
const $ = id => document.getElementById(id);
let phase = "searching", range = "60-130", shownMph = 0, targetMph = 0, lastResults = "";

document.querySelectorAll("#seg button").forEach(b => b.onclick = () => {
  range = b.dataset.r;
  document.querySelectorAll("#seg button").forEach(x => x.classList.toggle("sel", x === b));
});

$("go").onclick = () => {
  const url = (phase === "ready") ? "/start?range=" + encodeURIComponent(range) : "/cancel";
  fetch(url, {method: "POST"});
};

(function smooth() {
  shownMph += (targetMph - shownMph) * 0.25;
  if (Math.abs(targetMph - shownMph) < 0.03) shownMph = targetMph;
  $("mph").textContent = shownMph.toFixed(1);
  requestAnimationFrame(smooth);
})();

let lock = null;
async function wakeLock(on) {
  try {
    if (on && !lock && navigator.wakeLock) {
      lock = await navigator.wakeLock.request("screen");
      lock.addEventListener("release", () => { lock = null; });
    } else if (!on && lock) {
      await lock.release(); lock = null;
    }
  } catch (e) {}
}

function render(s) {
  phase = s.phase;
  document.body.className = s.phase;
  $("statustext").textContent = s.status;
  $("detail").innerHTML = s.detail ? (s.sim ? "SIMULATOR" : s.detail.toUpperCase()) : "&nbsp;";
  targetMph = s.connected ? s.mph : 0;
  $("elapsed").textContent = s.elapsed != null ? "+" + s.elapsed.toFixed(2) + " s" : "";

  const active = s.phase === "armed" || s.phase === "recording";
  const go = $("go");
  go.disabled = !s.connected;
  go.textContent = active ? "CANCEL" : "START LOG";
  go.className = active ? "cancel" : "";
  wakeLock(active);

  if (s.armed_range) {
    const [a, b] = s.armed_range;
    $("tick0").textContent = a;
    $("tick1").textContent = b;
    $("fill").style.width = Math.max(0, Math.min(100, (s.mph - a) / (b - a) * 100)) + "%";
  }

  const key = JSON.stringify(s.results);
  if (key === lastResults) return;
  lastResults = key;
  const best = {};
  for (const r of s.results)
    if (r.complete && (!(r.range in best) || r.total < best[r.range])) best[r.range] = r.total;
  $("runs").innerHTML = s.results.map(r => {
    const cls = r.complete ? "run" : "run partial";
    const head = r.complete ? r.range + " &middot; " + r.total.toFixed(2) + " s"
                            : r.range + " &middot; lifted early";
    const multiple = s.results.filter(x => x.complete && x.range === r.range).length > 1;
    const badge = (r.complete && multiple && r.total === best[r.range])
      ? '<span class="best">BEST</span>' : "";
    const bits = [];
    if (r.split1 != null) bits.push(r.split_labels[0] + " " + r.split1.toFixed(2) + "s");
    if (r.split2 != null) bits.push(r.split_labels[1] + " " + r.split2.toFixed(2) + "s");
    bits.push("vmax " + r.vmax.toFixed(1));
    return '<div class="' + cls + '"><div class="head"><span class="big">' + head + "</span>" + badge +
           '</div><div class="sub">' + bits.join(" &middot; ") + " &middot; " + r.when + "</div></div>";
  }).join("");
}

setInterval(() => fetch("/state").then(r => r.json()).then(render).catch(() => {}), 150);
</script></body></html>
