name: M240iTracker
options:
  bundleIdPrefix: com.kristiansimovski
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  M240iTracker:
    type: application
    platform: iOS
    sources: [Sources]
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: 60-130
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSLocalNetworkUsageDescription: >-
          Connects to your BMW through the MHD WiFi adapter to read
          vehicle speed for timing runs.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kristiansimovski.m240itracker
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: 60-130
